services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stalemiss
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./data:/usr/app/data
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: stalcraft_emissions
      PYTHONUNBUFFERED: 1
    command: ["python", "-u", "src/main.py"]

  mongo:
    image: mongo:7
    container_name: stalemiss-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mongo_data: